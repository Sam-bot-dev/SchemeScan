<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PolicyPilot</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #eef5ef, #dcefe3);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

.container {
    text-align: center;
    max-width: 700px;
}

h1 {
    color: #1c5d3a;
}

.subtitle {
    color: #4b6b57;
}

.chat-box {
    background: white;
    border-radius: 16px;
    padding: 20px;
    height: 350px;
    overflow-y: auto;
    margin-bottom: 20px;
}

.message { margin: 10px 0; }
.user { color: #1c5d3a; font-weight: bold; }
.bot { color: #333; }

.input-area {
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #f2f5f3;
}

button {
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #1c5d3a;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
    <h1>Hello! I'm PolicyPilot</h1>
    <p class="subtitle">Tell me about yourself — I'll find schemes for you</p>

    <div id="chatBox" class="chat-box"></div>

    <div class="input-area">
        <input id="input" placeholder="Describe yourself...">
        <button onclick="startMic()">🎤</button>
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<!-- 🔥 LOAD YOUR SCHEME DATA -->
<script src="data/schemes_0.js"></script>
<script src="data/schemes_1.js"></script>
<script src="data/schemes_2.js"></script>
<script src="data/schemes_3.js"></script>
<script src="data/schemes_4.js"></script>
<script src="data/schemes_5.js"></script>
<script src="data/schemes_6.js"></script>

<script>
let schemes = window.SCHEMES_DATA || [];

function searchSchemes(query) {
    query = query.toLowerCase();

    return schemes.filter(s =>
        (s.name && s.name.toLowerCase().includes(query)) ||
        (s.category && s.category.toLowerCase().includes(query)) ||
        (s.tags && s.tags.toLowerCase().includes(query))
    );
}

// 🔥 OLLAMA CALL
async function askOllama(message) {
    try {
        const res = await fetch("http://localhost:11434/api/generate", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                model: "phi3",
                prompt: `
Extract keywords like:
state, occupation, income, category

User: ${message}
                `,
                stream: false
            })
        });

        const data = await res.json();
        return data.response;
    } catch {
        return null;
    }
}

async function sendMessage() {
    const input = document.getElementById("input");
    const chatBox = document.getElementById("chatBox");

    const msg = input.value;
    if (!msg) return;

    chatBox.innerHTML += `<div class="message user">You: ${msg}</div>`;
    input.value = "";

    let ai = await askOllama(msg);

    // 🔥 Combine AI + search
    let results = searchSchemes(msg + " " + (ai || ""));

    let reply = "";

    if (results.length === 0) {
        reply = "No schemes found. Try giving more details.";
    } else {
        reply = "Top schemes:\n\n";
        results.slice(0,5).forEach((s,i)=>{
            reply += `${i+1}. ${s.name}\n`;
        });
    }

    chatBox.innerHTML += `<div class="message bot">PolicyPilot: ${reply}</div>`;
    chatBox.scrollTop = chatBox.scrollHeight;

    speak(reply);
}

// 🎤 MIC
function startMic() {
    const recognition = new webkitSpeechRecognition();
    recognition.lang = "en-IN";

    recognition.onresult = e => {
        document.getElementById("input").value = e.results[0][0].transcript;
    };

    recognition.start();
}

// 🔊 SPEECH
function speak(text) {
    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-IN";
    window.speechSynthesis.speak(speech);
}
</script>

</body>
</html>
